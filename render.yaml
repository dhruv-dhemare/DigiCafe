services:
  - type: web
    name: webrtc-bifrost-backend
    env: node
    region: oregon
    plan: starter
    
    # Build command - install all workspace dependencies
    buildCommand: npm install && npm install --workspace=server
    
    # Start command - use full path from repo root
    startCommand: node server/src/index.js
    
    # Environment variables (set these in Render dashboard)
    envVars:
      - key: DATABASE_URL
        scope: build
      - key: JWT_SECRET
        scope: build
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        scope: build
      - key: PORT
        value: "3000"
    
    # Auto-deploy on push
    autoDeploy: true

  - type: static_site
    name: webrtc-bifrost-frontend
    env: node
    region: oregon
    plan: free
    
    # Build command
    buildCommand: cd client && npm install && npm run build
    
    # Static publish path
    staticPublishPath: client/dist
    
    # Environment variables
    envVars:
      - key: VITE_BACKEND_URL
        scope: build
    
    # Auto-deploy on push
    autoDeploy: true
